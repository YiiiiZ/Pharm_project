<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Order — Specialty Pharmacy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .section-title { font-size: .75rem; font-weight: 700; text-transform: uppercase;
                     letter-spacing: .08em; color: #6c757d; margin-bottom: .75rem; }
    #loading { display: none; }
  </style>
</head>
<body>
<div class="container py-5" style="max-width:760px">
  <div class="mb-4">
    <h4 class="fw-bold mb-0">New Patient Order</h4>
    <p class="text-muted small mb-0">Specialty Pharmacy Care Plan Generator</p>
  </div>

  <form method="post" id="orderForm">
    {% csrf_token %}

    <!-- Provider -->
    <div class="card mb-3 p-4">
      <div class="section-title">Referring Provider</div>
      <div class="row g-3">
        <div class="col-md-7">
          <label class="form-label">Provider Name</label>
          <input type="text" name="provider_name" class="form-control" required placeholder="Dr. Jane Smith">
        </div>
        <div class="col-md-5">
          <label class="form-label">NPI</label>
          <input type="text" name="provider_npi" class="form-control" required placeholder="1234567890" maxlength="10">
        </div>
      </div>
    </div>

    <!-- Patient -->
    <div class="card mb-3 p-4">
      <div class="section-title">Patient</div>
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">First Name</label>
          <input type="text" name="first_name" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Last Name</label>
          <input type="text" name="last_name" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">MRN</label>
          <input type="text" name="mrn" class="form-control" required placeholder="000123">
        </div>
        <div class="col-md-4">
          <label class="form-label">Date of Birth</label>
          <input type="date" name="dob" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">Weight (kg)</label>
          <input type="text" name="weight_kg" class="form-control" placeholder="72">
        </div>
        <div class="col-md-4">
          <label class="form-label">Allergies</label>
          <input type="text" name="allergies" class="form-control" placeholder="NKDA or list allergies">
        </div>
      </div>
    </div>

    <!-- Order -->
    <div class="card mb-3 p-4">
      <div class="section-title">Order Details</div>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Medication Name</label>
          <input type="text" name="medication_name" class="form-control" required placeholder="IVIG">
        </div>
        <div class="col-md-6">
          <label class="form-label">Primary Diagnosis (ICD-10)</label>
          <input type="text" name="primary_diagnosis" class="form-control" required placeholder="G70.01">
        </div>
        <div class="col-12">
          <label class="form-label">Additional Diagnoses <span class="text-muted">(one ICD-10 per line)</span></label>
          <textarea name="additional_diagnoses" class="form-control" rows="2" placeholder="I10&#10;K21.0"></textarea>
        </div>
      </div>
    </div>

    <!-- Clinical -->
    <div class="card mb-3 p-4">
      <div class="section-title">Clinical Information</div>
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Medication History <span class="text-muted">(one entry per line)</span></label>
          <textarea name="medication_history" class="form-control" rows="3"
            placeholder="Pyridostigmine 60 mg PO q6h PRN&#10;Prednisone 10 mg PO daily"></textarea>
        </div>
        <div class="col-12">
          <label class="form-label">Patient Records / Clinical Notes</label>
          <textarea name="patient_records" class="form-control" rows="6"
            placeholder="Paste clinical notes, history, labs, etc."></textarea>
        </div>
      </div>
    </div>

    <div id="loading" class="alert alert-info d-flex align-items-center gap-2">
      <div class="spinner-border spinner-border-sm" role="status"></div>
      Generating care plan — this may take 15–30 seconds...
    </div>

    <button type="submit" class="btn btn-primary px-5" id="submitBtn">Generate Care Plan</button>
  </form>
</div>

<script>
  document.getElementById("orderForm").addEventListener("submit", function () {
    document.getElementById("loading").style.display = "flex";
    document.getElementById("submitBtn").disabled = true;
    document.getElementById("submitBtn").textContent = "Generating…";
  });
</script>
</body>
</html>
